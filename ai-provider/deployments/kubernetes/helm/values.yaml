# Default values for ai-provider.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  namespace: ai-provider
  environment: production
  labels: {}
  annotations: {}

# Number of replicas for the AI Provider deployment
replicaCount: 3

# Container image settings
image:
  repository: ai-provider
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# Override the name of the chart
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  name: ai-provider-service-account
  annotations: {}
  automountServiceAccountToken: true

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  metricsPort: 9090
  annotations: {}
  labels: {}

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.ai-provider.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ai-provider-tls-secret
      hosts:
        - api.ai-provider.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  customMetrics: []

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Pod priority class name
priorityClassName: ai-provider-high-priority

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Application configuration
config:
  appName: ai-provider
  appVersion: "1.0.0"
  appEnv: production

  # Server settings
  server:
    host: "0.0.0.0"
    port: 8080
    readTimeout: 30
    writeTimeout: 30
    idleTimeout: 60
    maxHeaderBytes: 1048576

  # API settings
  api:
    basePath: "/api/v1"
    rateLimit: 100
    rateBurst: 200
    corsEnabled: true
    corsOrigins: "*"

  # Logging settings
  logging:
    level: info
    format: json
    output: stdout
    includeCaller: true
    includeTimestamp: true

  # Feature flags
  features:
    batchInference: true
    streamingInference: true
    gpuAcceleration: true
    multiRegion: false
    analytics: true
    billing: true

  # Performance tuning
  performance:
    maxGoroutines: 10000
    chanBufferSize: 1000
    gcPercent: 100
    memoryLimitMB: 4096

  # Resource limits
  resources:
    maxModels: 100
    maxVersionsPerModel: 50
    maxUploadSizeMB: 10240
    maxRequestSizeMB: 100

  # Session configuration
  session:
    enabled: true
    timeout: 1800
    maxPerUser: 5

  # Audit configuration
  audit:
    enabled: true
    logPath: /var/log/ai-provider/audit.log
    maxSizeMB: 100
    maxBackups: 10
    maxAgeDays: 365

  # Notification settings
  notifications:
    enabled: true
    email:
      enabled: true
    slack:
      enabled: false

  # Analytics settings
  analytics:
    enabled: true
    flushInterval: 60
    batchSize: 100

  # Cost management
  costTracking:
    enabled: true
    alertThreshold: 1000
    budgetPeriod: monthly

  # Alerting settings
  alerting:
    enabled: true
    cooldown: 300
    maxAlerts: 100

  # Dashboard settings
  dashboard:
    enabled: true
    refreshInterval: 30

  # Workspace settings
  workspace:
    enabled: true
    maxPerOrg: 100

  # Usage tracking
  usageTracking:
    enabled: true
    aggregationInterval: 3600

# Inference configuration
inference:
  enabled: true
  maxConcurrent: 10
  timeout: 300
  batchSize: 8
  gpu:
    enabled: true
    memoryFraction: 0.8
  cpuThreads: 8

# Model storage configuration
modelStorage:
  path: /data/models
  cachePath: /data/cache
  tempPath: /tmp/models
  maxSizeGB: 500
  downloadThreads: 4
  downloadTimeout: 3600
  validationEnabled: true

# PostgreSQL database configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: change_me_in_production
    username: ai_admin
    password: change_me_in_production
    database: ai_provider
    replicationUsername: replicator
    replicationPassword: change_me_in_production

  # PostgreSQL image
  image:
    repository: postgres
    tag: 15.4-alpine
    pullPolicy: IfNotPresent

  # Architecture
  architecture: standalone
  replicaCount: 1

  # PostgreSQL configuration
  primary:
    configuration: |
      max_connections = 200
      shared_buffers = 256MB
      effective_cache_size = 1GB
      maintenance_work_mem = 64MB
      checkpoint_completion_target = 0.9
      wal_buffers = 16MB
      default_statistics_target = 100
      random_page_cost = 1.1
      effective_io_concurrency = 200
      work_mem = 2621kB
      min_wal_size = 1GB
      max_wal_size = 4GB
      logging_collector = on
      log_statement = 'all'
      log_duration = on
      max_worker_processes = 4
      max_parallel_workers_per_gather = 2
      max_parallel_workers = 4
      max_parallel_maintenance_workers = 2
      wal_level = replica
      max_wal_senders = 3
      max_replication_slots = 3
      hot_standby = on

  # Persistence
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi

  # Resources
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Metrics
  metrics:
    enabled: true
    image:
      repository: quay.io/prometheuscommunity/postgres-exporter
      tag: v0.12.1
    serviceMonitor:
      enabled: true

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: change_me_in_production

  # Redis image
  image:
    repository: redis
    tag: 7.2-alpine
    pullPolicy: IfNotPresent

  # Architecture
  architecture: standalone
  replicaCount: 1

  # Redis configuration
  configmap:
    redis.conf: |
      bind 0.0.0.0
      port 6379
      protected-mode yes
      maxclients 10000
      maxmemory 2gb
      maxmemory-policy allkeys-lru
      appendonly yes
      appendfilename "appendonly.aof"
      appendfsync everysec
      save 900 1
      save 300 10
      save 60 10000

  # Persistence
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  # Resources
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi

  # Metrics
  metrics:
    enabled: true
    image:
      repository: bitnami/redis-exporter
      tag: 1.55.0
    serviceMonitor:
      enabled: true

# Security configuration
security:
  enabled: true
  authRequired: true

  # JWT configuration
  jwt:
    issuer: ai-provider
    expiry: 3600
    refreshExpiry: 604800
    secretKey: change_this_to_a_secure_random_string_in_production

  # Bcrypt configuration
  bcrypt:
    cost: 12

  # Rate limiting
  rateLimit:
    enabled: true

  # Encryption keys
  encryption:
    dataEncryptionKey: change_this_data_encryption_key_in_production
    apiKeyEncryptionKey: change_this_api_key_encryption_key_in_production

  # SSL/TLS
  tls:
    enabled: true
    secretName: ai-provider-tls-secret

# Multi-tenancy configuration
tenancy:
  enabled: true
  maxOrgs: 1000
  maxUsersPerOrg: 500
  defaultQuota: 1000000

# Plugin configuration
plugins:
  enabled: true
  path: /plugins
  maxPlugins: 100
  sandboxEnabled: true

# Integration configuration
integrations:
  enabled: true
  timeout: 30
  retryCount: 3
  retryDelay: 5

# Webhook configuration
webhooks:
  enabled: true
  timeout: 10
  retryCount: 3
  maxEvents: 10000

# Backup configuration
backup:
  enabled: true
  path: /backups
  schedule: "0 2 * * *"
  retentionDays: 30
  compression: gzip

# Maintenance mode configuration
maintenance:
  enabled: false
  message: "System under maintenance"

# Persistence / Storage
persistence:
  # Model storage PVC
  models:
    enabled: true
    storageClass: fast-ssd
    accessModes:
      - ReadWriteMany
    size: 500Gi

  # Cache storage PVC
  cache:
    enabled: true
    storageClass: fast-ssd
    accessModes:
      - ReadWriteMany
    size: 100Gi

  # Audit logs PVC
  audit:
    enabled: true
    storageClass: standard-hdd
    accessModes:
      - ReadWriteOnce
    size: 50Gi

  # Backup storage PVC
  backup:
    enabled: true
    storageClass: standard-hdd
    accessModes:
      - ReadWriteOnce
    size: 200Gi

  # Logs PVC
  logs:
    enabled: true
    storageClass: standard-hdd
    accessModes:
      - ReadWriteOnce
    size: 20Gi

  # Plugins PVC
  plugins:
    enabled: true
    storageClass: standard-hdd
    accessModes:
      - ReadWriteMany
    size: 10Gi

# Monitoring configuration
monitoring:
  # Prometheus ServiceMonitor
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: prometheus

  # Prometheus rules
  prometheusRules:
    enabled: true
    namespace: monitoring
    labels:
      release: prometheus

  # Grafana dashboards
  grafanaDashboards:
    enabled: true
    namespace: monitoring
    label: grafana_dashboard

# Network policies
networkPolicy:
  enabled: true
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      - namespaceSelector:
          matchLabels:
            name: monitoring
  egress:
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: postgres
      ports:
      - port: 5432
    - to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
      ports:
      - port: 6379

# Init containers
initContainers:
  # Wait for database
  waitForDb:
    enabled: true
    image: busybox:1.36

  # Wait for Redis
  waitForRedis:
    enabled: true
    image: busybox:1.36

  # Run migrations
  migrations:
    enabled: true

# Sidecar containers
sidecars:
  # Log collector (Fluent Bit)
  logCollector:
    enabled: true
    image: fluent/fluent-bit:2.1
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # Backup agent
  backupAgent:
    enabled: true
    image: ai-provider-backup:1.0.0
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Probes configuration
probes:
  liveness:
    enabled: true
    path: /health/live
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  readiness:
    enabled: true
    path: /health/ready
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  startup:
    enabled: true
    path: /health/startup
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1

# Extra environment variables
extraEnvVars: []
# - name: MY_VAR
#   value: my_value

# Extra environment variables from ConfigMap or Secret
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

# Extra volumes
extraVolumes: []
# - name: extra-volume
#   configMap:
#     name: extra-config

# Extra volume mounts
extraVolumeMounts: []
# - name: extra-volume
#   mountPath: /extra

# Extra init containers
extraInitContainers: []

# Extra sidecar containers
extraContainers: []

# Service mesh configuration (Istio)
serviceMesh:
  enabled: false
  istio:
    # VirtualService configuration
    virtualService:
      enabled: false
      gateways:
        - mesh
      hosts:
        - ai-provider
      retries:
        attempts: 3
        perTryTimeout: 30s

    # DestinationRule configuration
    destinationRule:
      enabled: false
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            h2UpgradePolicy: UPGRADE
        outlierDetection:
          consecutive5xxErrors: 5
          interval: 30s
          baseEjectionTime: 30s

# Jobs configuration
jobs:
  # Migration job
  migrations:
    enabled: true
    restartPolicy: Never
    backoffLimit: 3
    activeDeadlineSeconds: 300
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

# CronJobs configuration
cronJobs:
  # Backup cronjob
  backup:
    enabled: true
    schedule: "0 2 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Cleanup cronjob
  cleanup:
    enabled: true
    schedule: "0 3 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Test configuration
tests:
  enabled: true
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
