{{- if .Values.security.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    description: "Sensitive credentials and keys for AI Provider"
type: Opaque
data:
  # JWT secrets
  jwt-secret: {{ .Values.security.jwt.secretKey | default (randAlphaNum 64) | b64enc | quote }}
  jwt-refresh-secret: {{ .Values.security.jwt.refreshSecret | default (randAlphaNum 64) | b64enc | quote }}

  # Encryption keys
  data-encryption-key: {{ .Values.security.encryption.dataEncryptionKey | default (randAlphaNum 32) | b64enc | quote }}
  api-key-encryption-key: {{ .Values.security.encryption.apiKeyEncryptionKey | default (randAlphaNum 32) | b64enc | quote }}

  # Admin credentials
  admin-username: {{ .Values.security.admin.username | default "admin" | b64enc | quote }}
  admin-password: {{ .Values.security.admin.password | default (randAlphaNum 16) | b64enc | quote }}
  admin-email: {{ .Values.security.admin.email | default "admin@example.com" | b64enc | quote }}

  {{- if .Values.security.smtp.enabled }}
  # SMTP credentials
  smtp-host: {{ .Values.security.smtp.host | b64enc | quote }}
  smtp-port: {{ .Values.security.smtp.port | default 587 | toString | b64enc | quote }}
  smtp-username: {{ .Values.security.smtp.username | b64enc | quote }}
  smtp-password: {{ .Values.security.smtp.password | b64enc | quote }}
  smtp-from: {{ .Values.security.smtp.from | b64enc | quote }}
  {{- end }}

  {{- if .Values.security.apiKeys.openai }}
  # OpenAI API Key
  openai-api-key: {{ .Values.security.apiKeys.openai | b64enc | quote }}
  {{- end }}

  {{- if .Values.security.apiKeys.anthropic }}
  # Anthropic API Key
  anthropic-api-key: {{ .Values.security.apiKeys.anthropic | b64enc | quote }}
  {{- end }}

  {{- if .Values.security.apiKeys.azure }}
  # Azure OpenAI Key
  azure-openai-key: {{ .Values.security.apiKeys.azure | b64enc | quote }}
  {{- end }}

  {{- if .Values.security.apiKeys.aws }}
  # AWS credentials
  aws-access-key-id: {{ .Values.security.apiKeys.aws.accessKeyId | b64enc | quote }}
  aws-secret-access-key: {{ .Values.security.apiKeys.aws.secretAccessKey | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  annotations:
    description: "PostgreSQL database credentials"
    helm.sh/resource-policy: keep
type: Opaque
data:
  # PostgreSQL credentials
  username: {{ .Values.postgresql.auth.username | default "ai_admin" | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | default (randAlphaNum 24) | b64enc | quote }}
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | default (randAlphaNum 24) | b64enc | quote }}
  database: {{ .Values.postgresql.auth.database | default "ai_provider" | b64enc | quote }}

  {{- if .Values.postgresql.auth.replicationUsername }}
  # Replication credentials
  replication-username: {{ .Values.postgresql.auth.replicationUsername | b64enc | quote }}
  replication-password: {{ .Values.postgresql.auth.replicationPassword | default (randAlphaNum 24) | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if and .Values.redis.enabled (not .Values.redis.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
  annotations:
    description: "Redis cache credentials"
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Redis password
  password: {{ .Values.redis.auth.password | default (randAlphaNum 24) | b64enc | quote }}

  {{- if .Values.redis.auth.replicationPassword }}
  # Redis replication password
  replication-password: {{ .Values.redis.auth.replicationPassword | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled (not .Values.ingress.tls.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.tls.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: tls
  annotations:
    description: "TLS certificates for AI Provider"
    {{- if .Values.ingress.tls.certManager }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManager | quote }}
    {{- end }}
type: kubernetes.io/tls
data:
  {{- if .Values.ingress.tls.cert }}
  # TLS certificate (base64 encoded)
  tls.crt: {{ .Values.ingress.tls.cert | b64enc | quote }}
  {{- else }}
  tls.crt: ""
  {{- end }}

  {{- if .Values.ingress.tls.key }}
  # TLS private key (base64 encoded)
  tls.key: {{ .Values.ingress.tls.key | b64enc | quote }}
  {{- else }}
  tls.key: ""
  {{- end }}

  {{- if .Values.ingress.tls.ca }}
  # CA certificate (base64 encoded)
  ca.crt: {{ .Values.ingress.tls.ca | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.serviceMesh.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-mesh-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-mesh
  annotations:
    description: "TLS certificates for service mesh"
type: Opaque
data:
  # Service mesh TLS certificates
  ca.crt: ""
  tls.crt: ""
  tls.key: ""
---
{{- end }}

{{- if .Values.webhooks.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-webhook-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhooks
  annotations:
    description: "Webhook signing secret"
type: Opaque
data:
  webhook-secret: {{ .Values.webhooks.signingSecret | default (randAlphaNum 32) | b64enc | quote }}
---
{{- end }}

{{- if .Values.integrations.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-integration-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: integrations
  annotations:
    description: "Integration credentials and API keys"
type: Opaque
data:
  {{- if .Values.integrations.slack.enabled }}
  slack-webhook-url: {{ .Values.integrations.slack.webhookUrl | b64enc | quote }}
  slack-bot-token: {{ .Values.integrations.slack.botToken | b64enc | quote }}
  {{- end }}

  {{- if .Values.integrations.pagerduty.enabled }}
  pagerduty-service-key: {{ .Values.integrations.pagerduty.serviceKey | b64enc | quote }}
  {{- end }}

  {{- if .Values.integrations.datadog.enabled }}
  datadog-api-key: {{ .Values.integrations.datadog.apiKey | b64enc | quote }}
  datadog-app-key: {{ .Values.integrations.datadog.appKey | b64enc | quote }}
  {{- end }}

  {{- if .Values.integrations.newrelic.enabled }}
  newrelic-license-key: {{ .Values.integrations.newrelic.licenseKey | b64enc | quote }}
  {{- end }}

  {{- if .Values.integrations.vault.enabled }}
  vault-token: {{ .Values.integrations.vault.token | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if and .Values.externalDatabase.enabled (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-external-database
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-database
  annotations:
    description: "External database credentials"
type: Opaque
data:
  host: {{ .Values.externalDatabase.host | b64enc | quote }}
  port: {{ .Values.externalDatabase.port | default 5432 | toString | b64enc | quote }}
  database: {{ .Values.externalDatabase.database | b64enc | quote }}
  username: {{ .Values.externalDatabase.username | b64enc | quote }}
  password: {{ .Values.externalDatabase.password | b64enc | quote }}

  {{- if .Values.externalDatabase.sslMode }}
  ssl-mode: {{ .Values.externalDatabase.sslMode | b64enc | quote }}
  {{- end }}

  {{- if .Values.externalDatabase.sslCert }}
  ssl-cert: {{ .Values.externalDatabase.sslCert | b64enc | quote }}
  {{- end }}

  {{- if .Values.externalDatabase.sslKey }}
  ssl-key: {{ .Values.externalDatabase.sslKey | b64enc | quote }}
  {{- end }}

  {{- if .Values.externalDatabase.sslRootCert }}
  ssl-root-cert: {{ .Values.externalDatabase.sslRootCert | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if and .Values.externalRedis.enabled (not .Values.externalRedis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-external-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-redis
  annotations:
    description: "External Redis credentials"
type: Opaque
data:
  host: {{ .Values.externalRedis.host | b64enc | quote }}
  port: {{ .Values.externalRedis.port | default 6379 | toString | b64enc | quote }}

  {{- if .Values.externalRedis.password }}
  password: {{ .Values.externalRedis.password | b64enc | quote }}
  {{- end }}

  {{- if .Values.externalRedis.tlsEnabled }}
  tls-enabled: {{ "true" | b64enc | quote }}
  {{- end }}

  {{- if .Values.externalRedis.sslCert }}
  ssl-cert: {{ .Values.externalRedis.sslCert | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.audit.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-audit-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: audit
  annotations:
    description: "Audit logging credentials"
type: Opaque
data:
  {{- if .Values.audit.encryptionKey }}
  encryption-key: {{ .Values.audit.encryptionKey | b64enc | quote }}
  {{- else }}
  encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

  {{- if .Values.audit.signingKey }}
  signing-key: {{ .Values.audit.signingKey | b64enc | quote }}
  {{- else }}
  signing-key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
---
{{- end }}

{{- if .Values.backup.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider.fullname" . }}-backup-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-provider.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  annotations:
    description: "Backup credentials and configuration"
type: Opaque
data:
  {{- if .Values.backup.encryptionKey }}
  encryption-key: {{ .Values.backup.encryptionKey | b64enc | quote }}
  {{- else }}
  encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

  {{- if .Values.backup.s3.enabled }}
  # S3 backup credentials
  s3-access-key-id: {{ .Values.backup.s3.accessKeyId | b64enc | quote }}
  s3-secret-access-key: {{ .Values.backup.s3.secretAccessKey | b64enc | quote }}
  s3-bucket: {{ .Values.backup.s3.bucket | b64enc | quote }}
  s3-region: {{ .Values.backup.s3.region | b64enc | quote }}
  s3-endpoint: {{ .Values.backup.s3.endpoint | default "" | b64enc | quote }}
  {{- end }}

  {{- if .Values.backup.gcs.enabled }}
  # GCS backup credentials
  gcs-service-account-key: {{ .Values.backup.gcs.serviceAccountKey | b64enc | quote }}
  gcs-bucket: {{ .Values.backup.gcs.bucket | b64enc | quote }}
  {{- end }}

  {{- if .Values.backup.azure.enabled }}
  # Azure backup credentials
  azure-storage-account: {{ .Values.backup.azure.storageAccount | b64enc | quote }}
  azure-storage-key: {{ .Values.backup.azure.storageKey | b64enc | quote }}
  azure-container: {{ .Values.backup.azure.container | b64enc | quote }}
  {{- end }}
---
{{- end }}
