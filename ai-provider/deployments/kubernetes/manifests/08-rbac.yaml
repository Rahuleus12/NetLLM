# RBAC (Role-Based Access Control) for AI Provider Platform
# Provides necessary permissions for the AI Provider application to operate within the cluster
# Follows the principle of least privilege

---
# Service Account for AI Provider Application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-provider-service-account
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
    app.kubernetes.io/version: "1.0.0"
  annotations:
    description: "Service account for AI Provider application pods"
    # For AWS IAM Roles for Service Accounts (IRSA)
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/AIProviderRole
    # For GKE Workload Identity
    # iam.gke.io/gcp-service-account: ai-provider@PROJECT_ID.iam.gserviceaccount.com
    # For Azure AKS Pod Identity
    # azure.aad.pod-identity: "true"
automountServiceAccountToken: true
secrets:
- name: ai-provider-service-account-token

---
# Role for namespace-level permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-provider-role
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "Role with namespace-level permissions for AI Provider"
rules:
# ConfigMaps - Read and manage application configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  resourceNames: []

# Secrets - Read secrets (for database credentials, API keys, etc.)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
  resourceNames: []

# Pods - Read and manage pods (for health checks, status monitoring)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Pod status and logs - Read pod status and logs
- apiGroups: [""]
  resources: ["pods/log", "pods/status"]
  verbs: ["get", "list"]

# Services - Read and manage services (for service discovery)
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Endpoints - Read endpoints (for service mesh integration)
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch"]

# Events - Read and create events (for status reporting)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create"]

# PersistentVolumeClaims - Read and manage PVCs (for model storage)
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# PersistentVolumes - Read PVs (for storage management)
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch"]

# Deployments - Read and manage deployments (for operator functionality)
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Deployments status - Read deployment status
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get", "list", "watch"]

# StatefulSets - Read and manage StatefulSets (for database, cache)
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# StatefulSets status - Read StatefulSet status
- apiGroups: ["apps"]
  resources: ["statefulsets/status"]
  verbs: ["get", "list", "watch"]

# ReplicaSets - Read ReplicaSets (for deployment management)
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]

# DaemonSets - Read DaemonSets (for node-level operations)
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]

# Ingresses - Read and manage ingresses (for routing)
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Ingresses status - Read ingress status
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses/status"]
  verbs: ["get", "list", "watch"]

# NetworkPolicies - Read and manage network policies (for security)
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# PodDisruptionBudgets - Read and manage PDBs (for high availability)
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# HorizontalPodAutoscalers - Read and manage HPAs (for auto-scaling)
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# HorizontalPodAutoscalers status - Read HPA status
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers/status"]
  verbs: ["get", "list", "watch"]

# Jobs - Read and manage jobs (for batch processing)
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Jobs status - Read job status
- apiGroups: ["batch"]
  resources: ["jobs/status"]
  verbs: ["get", "list", "watch"]

# CronJobs - Read and manage cron jobs (for scheduled tasks)
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# CronJobs status - Read cron job status
- apiGroups: ["batch"]
  resources: ["cronjobs/status"]
  verbs: ["get", "list", "watch"]

# Leases - Read and manage leases (for leader election)
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# RoleBinding to bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-provider-role-binding
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "Binds ai-provider-role to ai-provider-service-account"
subjects:
- kind: ServiceAccount
  name: ai-provider-service-account
  namespace: ai-provider
roleRef:
  kind: Role
  name: ai-provider-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for cluster-wide read permissions (optional, use with caution)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-provider-cluster-reader
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "ClusterRole with read-only cluster-wide permissions for monitoring"
rules:
# Nodes - Read node information (for resource monitoring)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

# Nodes status - Read node status
- apiGroups: [""]
  resources: ["nodes/status"]
  verbs: ["get", "list", "watch"]

# Namespaces - Read namespaces (for multi-tenancy)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# PersistentVolumes - Read PVs cluster-wide
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch"]

# StorageClasses - Read storage classes (for storage management)
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]

# ClusterInformation - Read cluster info (for calico, cilium, etc.)
- apiGroups: ["crd.projectcalico.org", "cilium.io"]
  resources: ["clusterinformations", "ciliumclusterwidenetworkpolicies"]
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for cluster-wide read permissions (optional)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-provider-cluster-reader-binding
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "Binds ai-provider-cluster-reader to ai-provider-service-account"
subjects:
- kind: ServiceAccount
  name: ai-provider-service-account
  namespace: ai-provider
roleRef:
  kind: ClusterRole
  name: ai-provider-cluster-reader
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for managing custom resources (if using CRDs)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-provider-crd-manager
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "ClusterRole for managing AI Provider Custom Resource Definitions"
rules:
# AI Provider Custom Resources
- apiGroups: ["ai-provider.io"]
  resources: ["aimodels", "aimodels/status", "aimodels/finalizers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["ai-provider.io"]
  resources: ["inferenceinstances", "inferenceinstances/status", "inferenceinstances/finalizers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["ai-provider.io"]
  resources: ["modeldeployments", "modeldeployments/status", "modeldeployments/finalizers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# CustomResourceDefinitions - Read CRDs
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for CRD management (optional, only if using CRDs)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-provider-crd-manager-binding
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    description: "Binds ai-provider-crd-manager to ai-provider-service-account"
subjects:
- kind: ServiceAccount
  name: ai-provider-service-account
  namespace: ai-provider
roleRef:
  kind: ClusterRole
  name: ai-provider-crd-manager
  apiGroup: rbac.authorization.k8s.io

---
# Role for leader election (needed for operators and high availability)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-provider-leader-election-role
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
rules:
# ConfigMaps - For leader election lock
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Events - For leader election events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]

# Leases - For leader election (preferred method in Kubernetes 1.14+)
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# RoleBinding for leader election
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-provider-leader-election-binding
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: ai-provider-platform
subjects:
- kind: ServiceAccount
  name: ai-provider-service-account
  namespace: ai-provider
roleRef:
  kind: Role
  name: ai-provider-leader-election-role
  apiGroup: rbac.authorization.k8s.io

---
# Service Account Token Secret (automatically created by Kubernetes 1.24+)
# For older versions or when manual token management is needed
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-service-account-token
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: rbac
  annotations:
    kubernetes.io/service-account.name: ai-provider-service-account
    description: "Service account token for AI Provider"
type: kubernetes.io/service-account-token
