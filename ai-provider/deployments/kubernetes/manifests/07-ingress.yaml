# Ingress for AI Provider Platform
# Provides external access to AI Provider services with TLS termination
# Supports multiple ingress controllers (NGINX, Traefik, etc.)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-provider-ingress
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: ai-provider-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: |
      X-Forwarded-For $proxy_add_x_forwarded_for
      X-Forwarded-Proto https
      X-Real-IP $remote_addr
      X-Forwarded-Host $host
      X-Forwarded-Port $server_port
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    nginx.ingress.kubernetes.io/limit-burst: "50"

    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key,X-Organization-ID"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"

    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: ai-provider-service

    # SSL/TLS configuration
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"

    # Monitoring
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"

    # Security
    nginx.ingress.kubernetes.io/server-snippets: |
      if ($request_method !~ ^(GET|PUT|POST|DELETE|PATCH|OPTIONS)$ ) {
        return 405;
      }
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.ai-provider.example.com
    - ai-provider.example.com
    secretName: ai-provider-tls-secret
  rules:
  # Main API endpoint
  - host: api.ai-provider.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

  # Alternative domain
  - host: ai-provider.example.com
    http:
      paths:
      # API v1 endpoints
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

      # Health check endpoint
      - path: /health
        pathType: Exact
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

      # Readiness endpoint
      - path: /ready
        pathType: Exact
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

      # Metrics endpoint (consider restricting access)
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: ai-provider-service
            port:
              number: 9090

---
# Ingress for monitoring endpoints (optional, with different auth)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-provider-monitoring-ingress
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: monitoring-ingress
    app.kubernetes.io/part-of: ai-provider-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required - AI Provider Monitoring'
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - monitoring.ai-provider.example.com
    secretName: ai-provider-monitoring-tls-secret
  rules:
  - host: monitoring.ai-provider.example.com
    http:
      paths:
      # Prometheus metrics
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: ai-provider-service
            port:
              number: 9090

      # Health detailed info
      - path: /health/detailed
        pathType: Exact
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

---
# Default backend for unmatched routes
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-provider-default-backend
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: default-backend
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: ai-provider-service
      port:
        number: 8080
  rules:
  - host: "*.ai-provider.example.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-provider-service
            port:
              number: 8080

---
# Basic Auth Secret for monitoring endpoints
# Username: admin, Password: change_me_in_production
# Generate with: htpasswd -nb admin change_me_in_production | base64
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-basic-auth
  namespace: ai-provider
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: monitoring-auth
type: Opaque
data:
  # Default: admin:change_me_in_production
  # To generate: htpasswd -nb admin <password> | base64
  auth: YWRtaW46JGFwcjEkTTVBNWg1UjEkZjRFLkUzQnBwTmZPdDk4T0tLdVNxLwoK

