# Kubernetes Secrets for AI Provider
# Contains sensitive configuration data for the AI Provider platform
#
# IMPORTANT: In production, use external secret management (Vault, AWS Secrets Manager, etc.)
# These are example values - replace with actual secrets before deployment

apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-db-credentials
  namespace: ai-provider
  labels:
    app: ai-provider
    component: database
    version: v1
  annotations:
    description: "PostgreSQL database credentials"
    secret.kubernetes.io/managed-by: "kubectl"
type: Opaque
data:
  # PostgreSQL credentials (base64 encoded)
  # Default: ai_provider_user / change_me_in_production
  DB_USERNAME: YWlfcHJvdmlkZXJfdXNlcg==
  DB_PASSWORD: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=
  DB_HOST: cG9zdGdyZXNxbA==
  DB_PORT: NTQzMg==
  DB_NAME: YWlfcHJvdmlkZXI=
  # Root credentials for initialization
  POSTGRES_ROOT_PASSWORD: cm9vdF9wYXNzd29yZF9jaGFuZ2VfbWU=
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-redis-credentials
  namespace: ai-provider
  labels:
    app: ai-provider
    component: cache
    version: v1
  annotations:
    description: "Redis cache credentials"
type: Opaque
data:
  # Redis password (base64 encoded)
  # Default: change_me_in_production
  REDIS_PASSWORD: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=
  REDIS_HOST: cmVkaXM=
  REDIS_PORT: NjM3OQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-api-keys
  namespace: ai-provider
  labels:
    app: ai-provider
    component: api
    version: v1
  annotations:
    description: "API keys for external services"
type: Opaque
data:
  # API Keys (base64 encoded) - Replace with actual keys
  # Example: OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.
  OPENAI_API_KEY: eW91cl9vcGVuYWlfYXBpX2tleV9oZXJl
  ANTHROPIC_API_KEY: eW91cl9hbnRocm9waWNfYXBpX2tleV9oZXJl
  AZURE_OPENAI_KEY: eW91cl9henVyZV9vcGVuYWlfa2V5X2hlcmU=
  AWS_ACCESS_KEY_ID: eW91cl9hd3NfYWNjZXNzX2tleV9pZF9oZXJl
  AWS_SECRET_ACCESS_KEY: eW91cl9hd3Nfc2VjcmV0X2FjY2Vzc19rZXlfaGVyZQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-jwt-secret
  namespace: ai-provider
  labels:
    app: ai-provider
    component: auth
    version: v1
  annotations:
    description: "JWT signing secret for authentication"
type: Opaque
data:
  # JWT secret (base64 encoded)
  # Default: change_this_to_a_secure_random_string_in_production
  # Generate with: openssl rand -base64 32 | base64
  JWT_SECRET_KEY: Y2hhbmdlX3RoaXNfdG9fYV9zZWN1cmVfcmFuZG9tX3N0cmluZ19pbl9wcm9kdWN0aW9u
  JWT_REFRESH_SECRET: Y2hhbmdlX3RoaXNfcmVmcmVzaF9zZWNyZXRfdG9v
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-encryption-keys
  namespace: ai-provider
  labels:
    app: ai-provider
    component: security
    version: v1
  annotations:
    description: "Encryption keys for data at rest"
type: Opaque
data:
  # Encryption keys (base64 encoded)
  # Generate with: openssl rand -base64 32 | base64
  DATA_ENCRYPTION_KEY: Y2hhbmdlX3RoaXNfZGF0YV9lbmNyeXB0aW9uX2tleV9pbl9wcm9kdWN0aW9u
  API_KEY_ENCRYPTION_KEY: Y2hhbmdlX3RoaXNfYXBpX2tleV9lbmNyeXB0aW9uX2tleV9pbl9wcm9kdWN0aW9u
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-admin-credentials
  namespace: ai-provider
  labels:
    app: ai-provider
    component: admin
    version: v1
  annotations:
    description: "Initial admin user credentials"
type: Opaque
data:
  # Admin credentials (base64 encoded)
  # Default: admin / change_me_immediately
  # IMPORTANT: Change these immediately after first deployment
  ADMIN_USERNAME: YWRtaW4=
  ADMIN_PASSWORD: Y2hhbmdlX21lX2ltbWVkaWF0ZWx5
  ADMIN_EMAIL: YWRtaW5AZXhhbXBsZS5jb20=
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-smtp-credentials
  namespace: ai-provider
  labels:
    app: ai-provider
    component: email
    version: v1
  annotations:
    description: "SMTP credentials for email notifications"
type: Opaque
data:
  # SMTP credentials (base64 encoded)
  SMTP_HOST: c210cC5leGFtcGxlLmNvbQ==
  SMTP_PORT: NTg3
  SMTP_USERNAME: eW91cl9zbXRwX3VzZXJuYW1l
  SMTP_PASSWORD: eW91cl9zbXRwX3Bhc3N3b3Jk
  SMTP_FROM: bm9yZXBseUBleGFtcGxlLmNvbQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-ssl-certs
  namespace: ai-provider
  labels:
    app: ai-provider
    component: security
    version: v1
  annotations:
    description: "SSL/TLS certificates for HTTPS"
type: Opaque
data:
  # SSL certificates (base64 encoded)
  # In production, use cert-manager or external certificate management
  tls.crt: ""
  tls.key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-registry-credentials
  namespace: ai-provider
  labels:
    app: ai-provider
    component: registry
    version: v1
  annotations:
    description: "Docker registry credentials for private images"
type: kubernetes.io/dockerconfigjson
data:
  # Docker registry credentials (base64 encoded JSON)
  # Create with: kubectl create secret docker-registry ai-provider-registry-credentials \
  #   --docker-server=<your-registry> \
  #   --docker-username=<username> \
  #   --docker-password=<password> \
  #   --docker-email=<email>
  .dockerconfigjson: e30K
---
# Secret for service mesh (if using Istio, Linkerd, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: ai-provider-mesh-tls
  namespace: ai-provider
  labels:
    app: ai-provider
    component: mesh
    version: v1
  annotations:
    description: "TLS certificates for service mesh"
type: Opaque
data:
  # Service mesh TLS certificates
  # These are typically managed by the service mesh itself
  ca.crt: ""
  tls.crt: ""
  tls.key: ""
