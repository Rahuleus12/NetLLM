apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ai-provider
  namespace: argocd
  labels:
    app.kubernetes.io/name: ai-provider
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: ai-provider-platform
    app.kubernetes.io/managed-by: argocd
  annotations:
    description: "AI Provider Platform - Local AI Model Management"
    owner: "platform-team"
    contact: "platform-team@example.com"
spec:
  # Project description
  description: AI Provider Platform - Production deployment project for local AI model management, inference, and multi-tenancy support

  # Source repositories allowed for this project
  sourceRepos:
  - '*'  # Allow all repositories (restrict in production)
  # - 'https://github.com/ai-provider/ai-provider.git'
  # - 'https://github.com/ai-provider/ai-provider-charts.git'
  # - 'https://charts.bitnami.com/bitnami'
  # - 'https://prometheus-community.github.io/helm-charts'
  # - 'https://grafana.github.io/helm-charts'

  # Destinations where applications can be deployed
  destinations:
  # Allow deployment to ai-provider namespace on any cluster
  - namespace: 'ai-provider*'
    server: '*'
  # Allow deployment to monitoring namespace for observability stack
  - namespace: 'monitoring'
    server: '*'
  # Allow deployment to ingress-nginx namespace for ingress controller
  - namespace: 'ingress-nginx'
    server: '*'
  # Allow deployment to cert-manager namespace for certificate management
  - namespace: 'cert-manager'
    server: '*'

  # Cluster resource allowlist - cluster-wide resources that can be created
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: ''
    kind: PersistentVolume
  - group: ''
    kind: StorageClass
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
  - group: networking.k8s.io
    kind: IngressClass
  - group: policy
    kind: PodSecurityPolicy
  - group: cert-manager.io
    kind: ClusterIssuer
  - group: monitoring.coreos.com
    kind: PrometheusRule
  - group: monitoring.coreos.com
    kind: ServiceMonitor
  - group: monitoring.coreos.com
    kind: PodMonitor

  # Namespace resource allowlist - namespaced resources that can be created
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: ''
    kind: Endpoints
  - group: ''
    kind: PersistentVolumeClaim
  - group: ''
    kind: Pod
  - group: ''
    kind: ReplicationController
  - group: apps
    kind: Deployment
  - group: apps
    kind: StatefulSet
  - group: apps
    kind: DaemonSet
  - group: apps
    kind: ReplicaSet
  - group: batch
    kind: Job
  - group: batch
    kind: CronJob
  - group: networking.k8s.io
    kind: Ingress
  - group: networking.k8s.io
    kind: NetworkPolicy
  - group: policy
    kind: PodDisruptionBudget
  - group: autoscaling
    kind: HorizontalPodAutoscaler
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
  - group: ai-provider.io
    kind: AIModel
  - group: ai-provider.io
    kind: InferenceInstance
  - group: ai-provider.io
    kind: ModelDeployment
  - group: monitoring.coreos.com
    kind: PrometheusRule
  - group: monitoring.coreos.com
    kind: ServiceMonitor
  - group: monitoring.coreos.com
    kind: PodMonitor
  - group: monitoring.coreos.com
    kind: AlertmanagerConfig
  - group: integreatly.org
    kind: GrafanaDashboard
  - group: integreatly.org
    kind: GrafanaDataSource
  - group: cert-manager.io
    kind: Certificate
  - group: helm.crd.vivaldi.io
    kind: HelmRepository
  - group: helm.crd.vivaldi.io
    kind: HelmRelease

  # Roles for RBAC within ArgoCD
  roles:
  # Developer role - read-only access
  - name: developer
    description: Developer access to view applications
    policies:
    - p, proj:ai-provider:developer, applications, get, ai-provider/*, allow
    - p, proj:ai-provider:developer, applications, sync, ai-provider/*, deny
    - p, proj:ai-provider:developer, clusters, get, ai-provider/*, allow
    - p, proj:ai-provider:developer, repositories, get, ai-provider/*, allow
    - p, proj:ai-provider:developer, logs, get, ai-provider/*, allow
    - p, proj:ai-provider:developer, exec, create, ai-provider/*, deny
    groups:
    - ai-provider-developers

  # DevOps role - full access to applications
  - name: devops
    description: DevOps team access to manage applications
    policies:
    - p, proj:ai-provider:devops, applications, *, ai-provider/*, allow
    - p, proj:ai-provider:devops, clusters, *, ai-provider/*, allow
    - p, proj:ai-provider:devops, repositories, *, ai-provider/*, allow
    - p, proj:ai-provider:devops, logs, *, ai-provider/*, allow
    - p, proj:ai-provider:devops, exec, *, ai-provider/*, allow
    groups:
    - ai-provider-devops

  # Admin role - full access
  - name: admin
    description: Admin access with full permissions
    policies:
    - p, proj:ai-provider:admin, *, *, ai-provider/*, allow
    groups:
    - ai-provider-admins

  # Sync windows - control when syncs can occur
  syncWindows:
  # Allow syncs during business hours only for production
  - kind: allow
    schedule: 'Mon-Fri 09:00-18:00'
    duration: 9h
    applications:
    - '*-production'
    namespaces:
    - ai-provider-production
    manualSync: true
    timeZone: "America/New_York"

  # Deny syncs during maintenance windows
  - kind: deny
    schedule: 'Sat-Sun 00:00-23:59'
    duration: 24h
    applications:
    - '*-production'
    namespaces:
    - ai-provider-production
    manualSync: false
    timeZone: "America/New_York"

  # Signature keys for verification (optional)
  signatureKeys:
  - keyID: ai-provider-signing-key
    keyData: |
      -----BEGIN PGP PUBLIC KEY BLOCK-----

      mQINBGWpC4YBEACj...
      -----END PGP PUBLIC KEY BLOCK-----

  # Resource ignores - resources to ignore during diffing
  resourceIgnoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: StatefulSet
    jsonPointers:
    - /spec/replicas
  - group: autoscaling
    kind: HorizontalPodAutoscaler
    jsonPointers:
    - /spec/targetCPUUtilizationPercentage
    - /spec/metrics

  # Orphaned resources - how to handle orphaned resources
  orphanedResources:
    warn: true
    ignore:
    - group: ''
      kind: Secret
      name: '*-token-*'
    - group: ''
      kind: ConfigMap
      name: '*-kube-root-ca.crt'

  # Sync options
  syncOptions:
  - PrunePropagationPolicy=foreground
  - PruneLast=true
  - Replace=false
  - ApplyOutOfSyncOnly=true
  - RespectIgnoreDifferences=true
  - CreateNamespace=true
  - ServerSideApply=true

  # Finalizers
  finalizers:
  - resources-finalizer.argocd.argoproj.io

  # Source namespaces for Application resources
  sourceNamespaces:
  - argocd
  - ai-provider

  # Permit only specific Kubernetes versions
  permittedKubernetesVersions:
  - "1.25"
  - "1.26"
  - "1.27"
  - "1.28"
  - "1.29"
